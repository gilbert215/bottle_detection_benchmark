# Starting hyperparameters for the Faster R-CNN (ResNet50-FPN) comparison run.
# Not yet tuned for this dataset — adjust as needed once you run scripts/train.py.
model: fasterrcnn_resnet50_fpn
num_classes: 2          # background + bottle
pretrained: true

optimizer:
  type: SGD
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.0005

train:
  epochs: 10
  batch_size: 4
  num_workers: 2
